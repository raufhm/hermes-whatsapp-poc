services:
  hermes:
    image: nousresearch/hermes-agent:v2026.4.16
    container_name: hermes-${ENV:-dev}
    restart: unless-stopped
    command: gateway run
    environment:
      # OpenRouter API Configuration
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      
      # WhatsApp Configuration
      - WHATSAPP_ENABLED=${WHATSAPP_ENABLED:-true}
      - WHATSAPP_MODE=${WHATSAPP_MODE:-bot}
      - WHATSAPP_ALLOWED_USERS=${WHATSAPP_ALLOWED_USERS:-*}
      - WHATSAPP_ALLOW_ALL_USERS=${WHATSAPP_ALLOW_ALL_USERS:-}
      - WHATSAPP_DEBUG=${WHATSAPP_DEBUG:-false}
      
      # Model Configuration
      - HERMES_MODEL=${HERMES_MODEL:-nousresearch/hermes-3-llama-3.1-70b}
      
      # Debug mode
      - HERMES_DEBUG=${HERMES_DEBUG:-false}
      - PATH=/opt/hermes/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      
      # NPM configuration for WhatsApp bridge (faster registry and increased timeouts)
      - NPM_CONFIG_REGISTRY=https://registry.npmmirror.com
      - NPM_CONFIG_FETCH_RETRY_MINTIMEOUT=2000
      - NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT=30000
      - NPM_CONFIG_FETCH_RETRIES=5
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      
      # EC2 SSH Configuration
      - EC2_HOST=${EC2_HOST}
      - EC2_USER=${EC2_USER}
      - EC2_KEY_FILE=${EC2_KEY_FILE:-ec2-whatsapp.pem}
      - EC2_KEY_PATH=/opt/keys/${EC2_KEY_FILE:-ec2-whatsapp.pem}
    
    volumes:
      # Persist Hermes configuration and session data
      - ./data/hermes-${ENV:-dev}:/opt/data
      
      # Automate skill syncing (mounted separately to avoid shadowing)
      - ./artifacts/skills:/opt/artifacts/skills:ro
      
      # Automate personality syncing
      - ./artifacts/soul/SOUL.md:/opt/data/SOUL.md:ro
      
      # Environment-aware config file mounting from artifacts
      - ./artifacts/config/${HERMES_CONFIG_FILE:-config-${ENV:-dev}.yaml}:/opt/data/config.yaml:ro
      
      # Mount EC2 PEM key file (if provided via EC2_KEY_PATH in .env)
      - ${EC2_KEY_PATH:-/dev/null}:/opt/keys/${EC2_KEY_FILE:-ec2-whatsapp.pem}:ro
    
    networks:
      - hermes-network
    
    # Health check
    healthcheck:
      test: ["CMD", "hermes", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  hermes-network:
    driver: bridge
